version: '3.8'

services:

  # MySQL for User Service
  user-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: yourpassword
      MYSQL_DATABASE: user_db
    ports:
      - "3307:3306"

  # MySQL for Product Service
  product-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: yourpassword
      MYSQL_DATABASE: product_db
    ports:
      - "3308:3306"

  # MySQL for Order Service
  order-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: yourpassword
      MYSQL_DATABASE: order_db
    ports:
      - "3309:3306"

  # Eureka Server
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"

  # API Gateway
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server

  # User Service
  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    depends_on:
      - user-db
      - eureka-server

  # Product Service
  product-service:
    build: ./product-service
    ports:
      - "8082:8082"
    depends_on:
      - product-db
      - eureka-server

  # Order Service
  order-service:
    build: ./order-service
    ports:
      - "8083:8083"
    depends_on:
      - order-db
      - eureka-server
      - user-service
      - product-service